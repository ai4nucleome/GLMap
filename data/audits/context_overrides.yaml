# ---- GenSLM (GPT-NeoX codon language model, PATRIC bacterial genomes) ----
# Bare-name IDs (no org/repo); local weights symlinked under
# models/modelsHFNoInfo/genslm/weights/. Source/loader code under
# models/modelsHFNoInfo/genslm/ with MODELS dict in genslm/inference.py
# pinning all three variants at seq_length=2048 codon tokens
# (= 6144 bp because tokenizer is codon_wordlevel_69vocab.json, 1 token = 3 bp).
# Single-matrix protocol (commit 5e59154 retired the codon-NaN three-matrix
# split): GenSLM enters L on the full panel like any other AR model; the
# codon-vs-nucleotide systematic offset on noncoding probes is absorbed by
# ModelMap double-centering (row + col mean subtraction).
GenSLM-25M:
  context_tokens: 2048
  source: genslm_inference_MODELS_dict
  note: "GPT-NeoX 25M, codon tokenizer (69 vocab incl. specials), seq_length=2048 codon tokens (= 6144 bp). Weights: patric_25m_epoch01-val_loss_0.57_bias_removed.pt"
GenSLM-250M:
  context_tokens: 2048
  source: genslm_inference_MODELS_dict
  note: "GPT-NeoX 244M, codon tokenizer, seq_length=2048 codon tokens. Weights: patric_250m_epoch00_val_loss_0.48_attention_removed.pt"
GenSLM-2.5B:
