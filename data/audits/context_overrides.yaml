# context_overrides.yaml
#
# Highest-priority context_tokens source for `scripts/audits/context_and_length_audit.py`.
# Use this file for repos whose `config.json` is gated, missing, behind
# trust_remote_code, or simply does not encode a context limit (e.g. NTv3
# custom code, Evo 2 minimal config, MegaDNA non-HF format).
#
# Schema:
#   <hf_id>:
#     context_tokens: <positive int>
#     source: <short tag, e.g. catalog_model_catalog.md, paper, hf_card>
#     note: <free-text reason>
#
# Audit reports the chosen value as `context_limit_source = override:<source>`.

# ---- MegaDNA (byte-level multiscale transformer, not transformers-loadable) ----
# Local weights live in models/modelsHFNoInfo/megaDNA; loaded via torch.load,
# not via HF transformers. 131K-token context per project owner.
lingxusb/megaDNA:
  context_tokens: 131072
  source: user_confirmation
  note: "MegaDNA 145M phage model; 131K-byte context (user-confirmed 2026-05-14). Local weights under models/modelsHFNoInfo/megaDNA/megaDNA_phage_145M.pt; not loadable via transformers."

# ---- PlasmidGPT (GPT-2 style + Addgene BPE tokenizer) ----
lingxusb/PlasmidGPT:
  context_tokens: 2048
  source: model_config_n_positions
  note: "PlasmidGPT pretrained_model.pt loads via torch.load as a GPT2LMHeadModel with config.n_positions=2048 (verified by loading + reading config). Tokenizer is the standalone addgene_trained_dna_tokenizer.json BPE, vocab 30002, no special tokens registered (pad/eos/cls/unk/mask all None). bp:token ratio is highly sequence-dependent (32 bp/tok on poly-A but ~3.85 bp/tok on mixed ACGT) because BPE chooses long merges for low-entropy DNA."

