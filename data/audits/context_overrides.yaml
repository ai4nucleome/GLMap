# ---- Mistral-DNA-v1-138M-noncoding (the ONE MoE variant in the Mistral-DNA family) ----
# This override exists for documentation, not to change context_tokens (the
# config.json correctly reports 512). It pins down the two facts that the
# generic audit cannot infer from config.json + readme heuristics, and that
# explain the model's anomalous phase 1 scoring behaviour
# (panel-wide ell/bp ≈ -6.74 vs sibling Mistral-DNA-* at ≈ -1.4):
#   1. ARCHITECTURE: 17.31M params × 8 experts = 138.5M total params (MoE
#      top-k routing). Every other Mistral-DNA-* variant in the audit is a
#      dense ~138M model. The MoE structure is invisible to the audit's
#      `architecture: transformer_decoder` / `param_count: 138474240`.
#   2. TRAINING DATA: ~1,940,736 non-coding RNAs from Rfam, each split into
#      100 bp segments (NB: DNA sequence, not RNA). Total ~194 Mb — orders
#      of magnitude smaller and far more narrowly distributed than sibling
#      variants' whole-genome corpora (hg38 3.1 Gb, fungal/bacterial multi-Gb).
# Stage 2 panel contains 14 functional elements, almost all of which are
# OOD for an Rfam-only model (promoter, enhancer, splice_*, chromatin_access,
# polyA, fungi_genome, virus_*, yeast_genome are not small ncRNAs). MoE top-k
# routing degrades further on OOD inputs.
# Phase 1 keep / phase 2 flag: stability gate passes (Pearson r = 1.0,
# max_diff = 0), so it is a real upstream model + training-corpus artefact,
# not a numerical bug. ModelMap clip(q=0.02) + double-centering absorbs the
# model-level bias from the matrix; the residual cross-probe variability
# (per-element std ≈ 0.36–0.73 vs sibling ≈ 0.06, an order of magnitude
# larger) is genuine MoE-on-OOD routing signal worth flagging in the phase
# 1 + phase 2 reports.
RaphaelMourad/Mistral-DNA-v1-138M-noncoding:
  context_tokens: 512
  source: hf_readme_2026_05_20
  note: "MoE: 17.31M params * 8 experts (top-k routing). Training corpus: ~1.94M Rfam non-coding RNAs split into 100 bp DNA-sequence segments (~194 Mb total). Panel-wide ell/bp ~ -6.74 vs sibling Mistral-DNA-* ~ -1.4 is upstream model + corpus narrowness, not pipeline bug. context_tokens=512 matches config.json; this entry exists as audit-side documentation of the MoE + Rfam-only facts that cannot be inferred from config.json."

# ---- MutBERT (RoPE-BERT trained at base 512; extend to 1024 via NTK-aware scaling) ----
# Base training context is 512 tokens (max_position_embeddings=512); to cover
# the Stage 2 panel (up to 1024 bp), MutBERTLoader auto-derives rope_scaling
# factor = context_tokens / 512. Override context_tokens to 1024 so the
# loader applies factor=2 (~99% accuracy retention, NTK-aware dynamic).
# Without this override 3977/10000 panel probes (L>512) would exceed positional
# embedding limits and either truncate or error.
JadenLong/MutBERT:
  context_tokens: 1024
  source: panel_coverage_requirement
  note: "Base 512 + NTK-aware RoPE scaling factor=2 → effective 1024. Stage 2 panel has 3977/10000 probes with L>512; without override these exceed positional embeddings."
JadenLong/MutBERT-Multi:
  context_tokens: 1024
  source: panel_coverage_requirement
  note: "Base 512 + NTK-aware RoPE scaling factor=2 → effective 1024 (see MutBERT entry)."
JadenLong/MutBERT-Human-Ref:
  context_tokens: 1024
  source: panel_coverage_requirement
  note: "Base 512 + NTK-aware RoPE scaling factor=2 → effective 1024 (see MutBERT entry)."
